<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>MeguProxy — Редактор правил</title>
  <style>
    body { margin: 0; background: #1e1f22; color: #f2f3f5; font-family: Inter, Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; }
    .top { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: #2b2d31; }
    .title { font-size: 18px; font-weight: 700; }
    .right { display: flex; align-items: center; gap: 12px; }
    .status { font-size: 13px; color: #57f287; min-width: 90px; text-align: right; }
    button { border: 0; border-radius: 10px; padding: 10px 14px; background: #5865f2; color: #fff; font-weight: 700; cursor: pointer; }
    textarea { flex: 1; margin: 16px; border: 0; outline: 0; border-radius: 14px; background: #111214; color: #f2f3f5; padding: 16px; resize: none; font-size: 14px; line-height: 1.5; font-family: Consolas, monospace; }
  </style>
</head>
<body>
  <div class="top">
    <div class="title">Редактор правил</div>
    <div class="right">
      <div id="status" class="status"></div>
      <button id="saveBtn" type="button">Сохранить</button>
    </div>
  </div>
  <textarea id="rulesEditor" placeholder="*.example.com"></textarea>
  <script src="list.js"></script>
</body>
</html>
